# ╔══════════════════════════════════════════════════════════════════╗
# ║  AEGIS — Kubernetes Deployment                                   ║
# ║  Apply with: kubectl apply -f kubernetes/                        ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aegis
  labels:
    project: aegis

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  NODE_ENV: "production"
  PORT: "3000"
  # EDIT THIS: Set to the region where this cluster runs
  REGION: "us-east-1"

---
# ── Secret ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secret
  namespace: aegis
type: Opaque
stringData:
  SESSION_SECRET: "aegis-k8s-secret-change-in-prod"

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-app
  namespace: aegis
  labels:
    app: aegis-app
spec:
  replicas: 2           # 2 pods per region for HA
  selector:
    matchLabels:
      app: aegis-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime deployments
  template:
    metadata:
      labels:
        app: aegis-app
    spec:
      containers:
      - name: aegis-app
        # EDIT THIS: Replace with your Docker Hub image
        image: YOURDOCKERHUBUSERNAME/aegis-cloud:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: aegis-config
        - secretRef:
            name: aegis-secret
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aegis-service
  namespace: aegis
spec:
  selector:
    app: aegis-app
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    nodePort: 30080   # Access via http://EC2_IP:30080

---
# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-hpa
  namespace: aegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
